<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Temel ──────────────────────────────────── -->
    <title>Lise Vitrini</title>
    <meta name="description" content="Okulunun sosyal ağı — tweetler, vitrin ve daha fazlası." />
    <meta name="author" content="Şigal Medya" />

    <!-- ── PWA / Manifest ─────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── iOS Safari PWA ─────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lise Vitrini" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── Favicon ────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-192.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />

    <!-- ── Splash / Tile (Windows & eski iOS) ─────── -->
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />

    <!-- ── Renk şeması ────────────────────────────── -->
    <meta name="color-scheme" content="dark" />

    <!-- ── Telefon numarası otomatik link yapmasın ── -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Google Fonts (Outfit) ──────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>

    <!-- ── Vite entry point ───────────────────────── -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Service Worker Kaydı ──────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function (reg) {
              console.log('✅ Service Worker kayıtlı:', reg.scope);
            })
            .catch(function (err) {
              console.error('❌ Service Worker hatası:', err);
            });
        });
      }
    </script>
  </body>
</html>
